worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 기본 설정
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 15;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 15s;
    reset_timedout_connection on;
    server_tokens off;

    # 로그 포맷
    log_format main '$remote_addr - $request [$time_local] '
                    '$status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 보안 헤더
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;

    # Cloudflare Tunnel이 앞단에서 TLS 종료하므로 여기선 HTTP만
    # 실제 클라이언트 IP 복원
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # 파일 업로드 크기 제한
    client_max_body_size 10m;

    # IP 기준 rate limiting (세밀한 license/user 단위 제어는 앱 레벨에서 보완)
    limit_req_zone $binary_remote_addr zone=login_by_ip:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=validate_by_ip:10m rate=180r/m;

    # 업스트림 (FastAPI)
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # 헬스체크 엔드포인트 (Cloudflare Tunnel용)
        location /health {
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        location = /auth/login {
            limit_req zone=login_by_ip burst=10 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 15s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location = /v1/validate {
            limit_req zone=validate_by_ip burst=60 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 15s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # API 프록시
        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # 타임아웃
            proxy_connect_timeout 15s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # 정적 파일 (업로드 이미지) 직접 서빙
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff always;
        }
    }
}
