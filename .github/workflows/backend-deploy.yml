name: Backend CD

# main 브랜치에 push(= PR 머지)되거나 수동 실행 시에만 배포
# CI(빌드 검증)는 backend-ci.yml 에서 별도 수행
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:          # 수동 실행 버튼 (긴급 재배포 등)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # username/license-system

jobs:
  # ── 1. 빌드 & 푸시 ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # ghcr.io 푸시 권한

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ghcr.io 로그인 (GITHUB_TOKEN 자동 제공, 별도 설정 불필요)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 빌드 캐시 + 멀티플랫폼 지원을 위한 Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 이미지 태그 & 라벨 자동 생성
      # latest + 커밋 SHA 태그 동시 부여
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # 빌드 & 푸시 (GitHub Actions 캐시 활용으로 빠른 재빌드)
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64   # Hetzner는 amd64

  # ── 2. 서버 배포 ───────────────────────────────────────────
  deploy:
    name: Deploy to Azure VPS
    runs-on: ubuntu-latest
    needs: build              # 빌드 성공 후 실행
    environment: production   # GitHub Environments 보호 규칙 적용 가능

    steps:
      - name: Checkout (docker-compose.yml, nginx 설정 포함)
        uses: actions/checkout@v4

      # Azure VPS에 SSH 접속 후 배포
      # Secrets 설정 필요:
      #   VPS_HOST: 서버 IP 또는 도메인
      #   VPS_USER: 서버 유저명 (예: azureuser)
      #   VPS_SSH_KEY: 서버 SSH 개인키 (-----BEGIN... 포함 전체)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # 프로젝트 디렉터리로 이동
            cd /opt/license-system

            # 최신 docker-compose.yml, nginx.conf 동기화
            git pull origin main

            # ghcr.io 로그인 (서버에서는 PAT 사용)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # 최신 이미지 pull & 재시작 (무중단: DB는 유지)
            docker compose pull backend
            docker compose up -d --no-deps backend

            # 미사용 이미지 정리
            docker image prune -f

            echo "✅ Deploy complete"
